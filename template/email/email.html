<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 20px;
    line-height: 1.9;
    color: #222;
    max-width: 780px;
    margin: 0 auto;
    padding: 32px 24px;
    background: #fafaf8;
  }
  h2 {
    font-family: Arial, sans-serif;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #c00;
    border-bottom: 2px solid #c00;
    padding-bottom: 4px;
    margin-top: 40px;
  }
  p { margin: 0 0 16px; }
  strong { color: #111; }
  blockquote {
    border-left: 3px solid #c00;
    margin: 8px 0;
    padding: 4px 16px;
    color: #555;
    font-style: italic;
  }
</style>
</head>
<body>
{body}
</body>
</html>
